name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './playground/package-lock.json'
      - name: Build Playground
        run: |
          cd playground
          npm ci
          npm run build
      - name: Build Standalone Widget
        run: |
          cd cube-component-isolated
          npm install
          npm run build
      - name: Combine Outputs
        run: |
          mkdir -p dist
          cp -r playground/dist/* dist/
          mkdir -p dist/widget/assets
          cp cube-component-isolated/dist/assets/water-cube-widget.js dist/widget/assets/
          cp cube-component-isolated/dist/assets/water-cube-widget.css dist/widget/assets/
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
